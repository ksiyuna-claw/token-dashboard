<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦐 虾厂 Token 看板</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --dim: #8b949e; --green: #3fb950; --yellow: #d29922; --red: #f85149; --blue: #58a6ff; --purple: #bc8cff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 1100px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 22px; }
  .header .meta { font-size: 13px; color: var(--dim); }
  .section { margin-bottom: 28px; }
  .section-title { font-size: 14px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .provider-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 14px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .card .provider-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .card .provider-sub { font-size: 11px; color: var(--dim); margin-bottom: 12px; }
  .quota-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(48,54,61,0.5); }
  .quota-row:last-child { border-bottom: none; }
  .quota-row .label { font-size: 13px; color: var(--dim); }
  .quota-row .main-col { flex: 1; min-width: 0; }
  .quota-row .value { font-size: 18px; font-weight: 700; }
  .quota-row .sub { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .progress-bar .fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .countdown { font-size: 11px; color: var(--blue); }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .tag-green { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag-blue { background: rgba(88,166,255,0.15); color: #58a6ff; }
  .tag-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .tag-red { background: rgba(248,81,73,0.15); color: var(--red); }
  .no-quota { color: var(--dim); font-size: 13px; font-style: italic; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 12px; color: var(--dim); padding: 8px 10px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 8px 10px; font-size: 13px; border-bottom: 1px solid var(--border); }
  tr:hover { background: rgba(255,255,255,0.02); }
  .ctx-bar { display: inline-block; height: 4px; background: var(--border); border-radius: 2px; width: 60px; vertical-align: middle; overflow: hidden; }
  .ctx-bar .fill { height: 100%; border-radius: 2px; }
  .error { color: var(--red); font-size: 13px; padding: 8px; background: rgba(248,81,73,0.08); border-radius: 6px; }
  .loading { color: var(--dim); text-align: center; padding: 20px; font-size: 13px; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
  .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
  .summary-card .val { font-size: 24px; font-weight: 700; }
  .summary-card .lbl { font-size: 11px; color: var(--dim); margin-top: 4px; }
  .provider-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
  .provider-tag-zai { background: rgba(88,166,255,0.15); color: var(--blue); }
  .provider-tag-zhipu { background: rgba(63,185,80,0.15); color: var(--green); }
  .provider-tag-deepseek { background: rgba(248,81,73,0.15); color: var(--red); }
  .provider-tag-minimax { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .provider-tag-google { background: rgba(88,166,255,0.1); color: #8ab4f8; }
  .provider-tag-ollama { background: rgba(255,255,255,0.05); color: var(--dim); }
  .tab-bar { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
  .tab-btn { background: transparent; border: 1px solid var(--border); color: var(--dim); padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .tab-btn:hover { border-color: var(--blue); color: var(--text); }
  .tab-btn.active { background: rgba(88,166,255,0.12); border-color: var(--blue); color: var(--blue); font-weight: 600; }
  .tab-badge { display: inline-block; min-width: 16px; height: 16px; line-height: 16px; text-align: center; border-radius: 8px; font-size: 10px; background: var(--border); color: var(--dim); margin-left: 4px; padding: 0 4px; }
  .tab-btn.active .tab-badge { background: rgba(88,166,255,0.25); color: var(--blue); }
  .kind-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; margin-right: 4px; }
  .kind-badge-cron { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .kind-badge-subagent { background: rgba(188,140,255,0.15); color: var(--purple); }
  .kind-badge-slash { background: rgba(139,148,158,0.15); color: var(--dim); }
  .kind-badge-weixin { background: rgba(63,185,80,0.15); color: var(--green); }
  .kind-badge-system { background: rgba(88,166,255,0.1); color: var(--blue); }
  .empty-msg { color: var(--dim); text-align: center; padding: 24px; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h1>🦐 虾厂 Token 看板</h1>
  <div class="meta">
    <span id="lastUpdate">加载中...</span> · 每60分钟刷新
  </div>
</div>

<div class="section">
  <div class="section-title">📦 模型供应商额度</div>
  <div class="provider-grid" id="providerGrid"><div class="loading">正在获取...</div></div>
</div>

<div class="section">
  <div class="section-title">🤖 员工状态</div>
  <div class="tab-bar" id="sessionTabs">
    <button class="tab-btn active" data-filter="direct" onclick="switchTab(this)">主会话<span class="tab-badge" id="badge-direct">0</span></button>
    <button class="tab-btn" data-filter="cron" onclick="switchTab(this)">定时任务<span class="tab-badge" id="badge-cron">0</span></button>
    <button class="tab-btn" data-filter="subagent" onclick="switchTab(this)">子代理<span class="tab-badge" id="badge-subagent">0</span></button>
    <button class="tab-btn" data-filter="slash" onclick="switchTab(this)">Slash<span class="tab-badge" id="badge-slash">0</span></button>
    <button class="tab-btn" data-filter="weixin" onclick="switchTab(this)">微信Bot<span class="tab-badge" id="badge-weixin">0</span></button>
    <button class="tab-btn" data-filter="system" onclick="switchTab(this)">系统<span class="tab-badge" id="badge-system">0</span></button>
    <button class="tab-btn" data-filter="all" onclick="switchTab(this)">全部<span class="tab-badge" id="badge-all">0</span></button>
    <span id="sessionCount" style="font-size:11px;color:var(--dim);margin-left:auto;align-self:center"></span>
  </div>
  <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr><th>员工</th><th>当前模型</th><th>输入</th><th>输出</th><th>上下文</th></tr>
      </thead>
      <tbody id="agentTable"><tr><td colspan="5" class="loading">正在获取...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="section">
  <div class="section-title">📊 总览</div>
  <div class="summary-grid" id="summaryGrid"><div class="loading">正在获取...</div></div>
</div>

<script>
const REFRESH_MS = 60 * 60 * 1000;

const AGENT_ORDER = ['main','xiaohexia','jiweixia','pipixia','caoxia','banjiexia','duijiaoxia'];
const AGENT_NAMES = {main:'罗氏虾',xiaohexia:'小河虾',jiweixia:'基围虾',pipixia:'皮皮虾',caoxia:'草虾',banjiexia:'班节虾',duijiaoxia:'对虾'};
const AGENT_EMOJI = {main:'🦞',xiaohexia:'🦐',jiweixia:'🦐',pipixia:'🦐',caoxia:'🦐',banjiexia:'🦐',duijiaoxia:'🦐'};
const PROVIDER_LABELS = {
  zai: {text:'海外', cls:'provider-tag-zai'},
  zhipu: {text:'国内', cls:'provider-tag-zhipu'},
  deepseek: {text:'DS', cls:'provider-tag-deepseek'},
  minimax: {text:'MiniMax', cls:'provider-tag-minimax'},
  google: {text:'Google', cls:'provider-tag-google'},
  ollama: {text:'本地', cls:'provider-tag-ollama'},
};

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}
function countdown(ts) {
  if (!ts) return '-';
  const d = ts - Date.now();
  if (d <= 0) return '已恢复';
  const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000);
  if (h > 24) return Math.floor(h/24) + '天' + (h%24) + '小时后';
  return h > 0 ? h+'时'+m+'分后' : m+'分钟后';
}
function timeProgress(ts, unit) {
  if (!ts) return '';
  const period = PERIOD_MS[unit];
  if (!period) return '';
  const d = ts - Date.now();
  const remaining = Math.max(d, 0);
  const elapsed = period - remaining;
  const pct = Math.min(Math.max(elapsed / period * 100, 0), 100).toFixed(0);
  return `，时间进度 ${pct}%`;
}

// ===== Session 分类 =====
// 按 key 模式分类，优先级从高到低
const CATEGORY_RULES = [
  { id: 'cron',     test: k => k.includes(':cron:'),                            label: 'cron',     badgeCls: 'kind-badge-cron' },
  { id: 'subagent', test: k => k.includes(':subagent:'),                         label: '子代理',   badgeCls: 'kind-badge-subagent' },
  { id: 'slash',    test: k => k.includes(':slash:'),                            label: 'slash',    badgeCls: 'kind-badge-slash' },
  { id: 'weixin',   test: k => k.includes('openclaw-weixin'),                    label: '微信',     badgeCls: 'kind-badge-weixin' },
  { id: 'direct',   test: k => k.includes('telegram:direct') || k.includes(':direct:'), label: '主会话', badgeCls: '' },
  { id: 'system',   test: k => k.endsWith(':main') || (k.includes(':main') && !k.includes(':cron:') && !k.includes(':subagent:')), label: '系统', badgeCls: 'kind-badge-system' },
];

function classifySession(s) {
  const key = s.key || '';
  for (const rule of CATEGORY_RULES) {
    if (rule.test(key)) return rule;
  }
  return { id: 'other', label: '其他', badgeCls: '' };
}

// ===== 统一状态判定系统 =====
const PERIOD_MS = {3: 5*3600000, 6: 7*24*3600000, 5: 24*3600000};

function getQuotaStatus(usedPct, nextReset, unit) {
  if (usedPct >= 100) return 'stopped';
  if (usedPct <= 0)    return 'bright_safe';
  const period = PERIOD_MS[unit];
  if (!period || !nextReset) {
    if (usedPct >= 90) return 'danger';
    if (usedPct >= 60) return 'warn';
    return 'safe';
  }
  const elapsed = period - (nextReset - Date.now());
  if (elapsed <= 0 || elapsed < 10 * 60 * 1000) return 'bright_safe';
  const timePct = Math.min(elapsed / period * 100, 100);
  const ratio = usedPct / Math.max(timePct, 0.1);
  if (ratio < 0.5) return 'safe';
  if (ratio < 1.0) return 'safe';
  if (ratio < 1.5) return 'warn';
  return 'danger';
}

const STATUS_COLOR = {bright_safe:'#58a6ff', safe:'var(--green)', warn:'var(--yellow)', danger:'#f0883e', stopped:'var(--red)'};
const STATUS_TAG   = {bright_safe:'观察中', safe:'安全', warn:'偏快', danger:'危险', stopped:'已停'};
const STATUS_CLS   = {bright_safe:'tag-blue', safe:'tag-green', warn:'tag-yellow', danger:'tag-red', stopped:'tag-red'};

function quotaColor(usedPct, nextReset, unit) { return STATUS_COLOR[getQuotaStatus(usedPct, nextReset, unit)]; }
function quotaTag(usedPct, nextReset, unit) {
  const s = getQuotaStatus(usedPct, nextReset, unit);
  return `<span class="tag ${STATUS_CLS[s]}">${STATUS_TAG[s]}</span>`;
}
function pctColor(p) { return STATUS_COLOR[getQuotaStatus(p, null, null)]; }
function providerTag(p) {
  const info = PROVIDER_LABELS[p];
  if (!info) return '';
  return `<span class="provider-tag ${info.cls}">${info.text}</span>`;
}

function renderQuotaCard(name, subtitle, limits, level) {
  let rows = '';
  for (const l of limits) {
    if (l.type === 'TIME_LIMIT') continue;
    if (l.type === 'TOKENS_LIMIT') {
      const c = quotaColor(l.percentage, l.nextResetTime, l.unit);
      const tag = quotaTag(l.percentage, l.nextResetTime, l.unit);
      const label = l.unit === 3 ? '5小时窗口' : l.unit === 6 ? '周额度' : 'Token';
      rows += `<div class="quota-row">
        <div class="main-col"><div class="label">${label}</div><div class="sub">${l.percentage}% 已用</div>
          <div class="progress-bar"><div class="fill" style="width:${l.percentage}%;background:${c}"></div></div>
          <div class="countdown">${l.percentage===0&&!l.nextResetTime?'✅ 已恢复':`🔄 ${l.percentage}%已用${timeProgress(l.nextResetTime, l.unit)}，${countdown(l.nextResetTime)} 恢复`}</div>
        </div>
        <div style="text-align:right">${tag}</div>
      </div>`;
    }
  }
  return rows ? `<div class="card"><div class="provider-name">${name}</div><div class="provider-sub">${subtitle}</div>${rows}</div>` : '';
}

function renderNoQuota(name, subtitle, note) {
  return `<div class="card"><div class="provider-name">${name}</div><div class="provider-sub">${subtitle}</div><div class="no-quota">${note}</div></div>`;
}

async function fetchProviderQuotas() {
  const cards = [];
  try {
    const r = await fetch('/quota-overseas');
    const j = await r.json();
    if (j.code === 200) cards.push(renderQuotaCard('智谱 Z.AI（海外）', `api.z.ai · ${j.data.level.toUpperCase()} 档`, j.data.limits, j.data.level));
    else if (j.error) cards.push(renderNoQuota('智谱 Z.AI（海外）', 'api.z.ai', '代理错误: '+j.error));
  } catch(e) { cards.push(renderNoQuota('智谱 Z.AI（海外）', 'api.z.ai', '获取失败: '+e.message)); }
  try {
    const r = await fetch('/quota-domestic');
    const j = await r.json();
    if (j.code === 200) cards.push(renderQuotaCard('智谱 BigModel（国内）', `open.bigmodel.cn · ${j.data.level.toUpperCase()} 档`, j.data.limits, j.data.level));
    else if (j.error) cards.push(renderNoQuota('智谱 BigModel（国内）', 'open.bigmodel.cn', '代理错误: '+j.error));
  } catch(e) { cards.push(renderNoQuota('智谱 BigModel（国内）', 'open.bigmodel.cn', '获取失败: '+e.message)); }
  // DeepSeek 余额
  try {
    const r = await fetch('/quota-deepseek');
    const j = await r.json();
    if (j.is_available !== undefined) {
      const info = j.balance_infos && j.balance_infos[0];
      if (info) {
        const total = parseFloat(info.total_balance || 0).toFixed(2);
        const availTag = j.is_available
          ? '<span class="tag tag-green">可用</span>'
          : '<span class="tag tag-red">不可用</span>';
        cards.push(`<div class="card"><div class="provider-name">DeepSeek</div><div class="provider-sub">api.deepseek.com · 按量付费</div>
          <div class="quota-row"><div><div class="label">余额（${info.currency || 'CNY'}）</div></div><div class="value" style="color:var(--green)">¥${total}</div></div>
          <div class="quota-row" style="border:none"><div></div>${availTag}</div>
        </div>`);
      } else {
        cards.push(renderNoQuota('DeepSeek', 'api.deepseek.com', '无余额信息'));
      }
    } else if (j.error) {
      cards.push(renderNoQuota('DeepSeek', 'api.deepseek.com', '获取失败: ' + j.error));
    }
  } catch(e) { cards.push(renderNoQuota('DeepSeek', 'api.deepseek.com', '获取失败: '+e.message)); }
  cards.push(renderNoQuota('MiniMax', 'api.minimaxi.com', '免费额度，无余额API'));
  cards.push(renderNoQuota('Google Gemini', 'generativelanguage.googleapis.com', '免费额度'));
  cards.push(renderNoQuota('Ollama（本地）', '127.0.0.1:11434', '本地模型，无限制'));
  document.getElementById('providerGrid').innerHTML = cards.join('');
}

let _allSessions = [];
let _currentFilter = 'direct';
let _categoryCounts = {};

function switchTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _currentFilter = btn.dataset.filter;
  renderSessions();
}

async function fetchSessions() {
  try {
    const r = await fetch('/sessions-json');
    const d = await r.json();
    const all = d.sessions || [];

    // 给每个 session 分类
    for (const s of all) {
      s._cat = classifySession(s);
      s._ctxBase = s.contextTokens || 200000;
      s._ctxUsed = s.totalTokens || 0;
    }

    // 按 agentId 找每个 agent 最新 direct session 的 ctx
    const latestCtxByAgent = {};
    for (const s of all) {
      if (s._cat.id === 'direct') {
        const aid = s.agentId;
        if (!latestCtxByAgent[aid] || (s.ageMs != null && s.ageMs < latestCtxByAgent[aid].ageMs)) {
          latestCtxByAgent[aid] = s;
        }
      }
    }
    for (const s of all) {
      const ref = latestCtxByAgent[s.agentId];
      if (ref && s.contextTokens === ref.contextTokens) {
        // ok, use own
      } else if (ref) {
        s._ctxBase = ref.contextTokens || 200000;
      }
    }

    _allSessions = all;

    // 统计各类别数量
    _categoryCounts = {};
    for (const cat of CATEGORY_RULES) {
      _categoryCounts[cat.id] = all.filter(s => s._cat.id === cat.id).length;
    }
    _categoryCounts['other'] = all.filter(s => s._cat.id === 'other').length;
    _categoryCounts['all'] = all.length;

    // 更新 tab badges
    for (const [id, count] of Object.entries(_categoryCounts)) {
      const el = document.getElementById('badge-' + id);
      if (el) el.textContent = count;
    }

    renderSessions();
  } catch(e) {
    document.getElementById('agentTable').innerHTML = `<tr><td colspan="5" class="error">获取失败: ${e.message}</td></tr>`;
  }
}

function renderSessions() {
  let filtered = _allSessions;
  if (_currentFilter !== 'all') {
    filtered = _allSessions.filter(s => s._cat.id === _currentFilter);
  }

  document.getElementById('sessionCount').textContent = `${filtered.length} / ${_allSessions.length} session`;

  let totalIn = 0, totalOut = 0;
  if (filtered.length === 0) {
    document.getElementById('agentTable').innerHTML = `<tr><td colspan="5" class="empty-msg">该分类暂无 session</td></tr>`;
  } else {
    let html = '';
    for (const s of filtered) {
      const cp = s._ctxBase ? Math.round((s._ctxUsed / s._ctxBase) * 100) : 0;
      const c = pctColor(cp);
      const age = !s.ageMs ? '-' : s.ageMs < 60000 ? '刚刚' : s.ageMs < 3600000 ? Math.floor(s.ageMs/60000)+'分前' : Math.floor(s.ageMs/3600000)+'时前';
      const displayName = AGENT_NAMES[s.agentId] || s.agentId;
      const emoji = AGENT_EMOJI[s.agentId] || '🤖';
      const ptag = providerTag(s.modelProvider);
      // kind badge
      let kindBadge = '';
      if (s._cat.badgeCls) {
        kindBadge = `<span class="kind-badge ${s._cat.badgeCls}">${s._cat.label}</span>`;
      }
      // key 截取显示
      const keyShort = (s.key || '').replace(/^agent:/, '').substring(0, 40);

      html += `<tr>
        <td>${emoji} <strong>${displayName}</strong> ${kindBadge}<br><span style="font-size:11px;color:var(--dim)">${age} · ${keyShort}</span></td>
        <td>${s.model||'-'} ${ptag}</td>
        <td>${fmt(s.inputTokens||0)}</td>
        <td>${fmt(s.outputTokens||0)}</td>
        <td>${cp}% <div class="ctx-bar"><div class="fill" style="width:${cp}%;background:${c}"></div></div></td>
      </tr>`;
      totalIn += s.inputTokens || 0;
      totalOut += s.outputTokens || 0;
    }
    document.getElementById('agentTable').innerHTML = html;
  }

  // 总览
  const agents = new Set(_allSessions.filter(s => s._cat.id === 'direct').map(s => s.agentId));
  document.getElementById('summaryGrid').innerHTML = [
    {lbl:'员工总数', val:agents.size},
    {lbl:'总 Session', val:_allSessions.length},
    {lbl:'主会话', val:(_categoryCounts.direct||0)},
    {lbl:'定时任务', val:(_categoryCounts.cron||0)},
    {lbl:'子代理', val:(_categoryCounts.subagent||0)},
    {lbl:'总输入 Token', val:fmt(totalIn)},
    {lbl:'总输出 Token', val:fmt(totalOut)},
  ].map(x=>`<div class="summary-card"><div class="val">${x.val}</div><div class="lbl">${x.lbl}</div></div>`).join('');
}

async function refresh() {
  document.getElementById('lastUpdate').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN');
  await Promise.all([fetchProviderQuotas(), fetchSessions()]);
}

refresh();
setInterval(refresh, REFRESH_MS);
setInterval(fetchProviderQuotas, 60000);
</script>
</body>
</html>
